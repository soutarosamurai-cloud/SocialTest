<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SocialTest</title>

<style>

body{
    margin:0;
    font-family: "Yu Gothic","Meiryo",sans-serif;
    background:#f4f7fb;
}

header{
    background:#1565C0;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    margin-top:10px;
}

.container{
    width:90%;
    max-width:700px;
    margin:auto;
    margin-top:30px;
}

.card{

    background:white;

    border-radius:15px;

    padding:20px;

    margin-bottom:18px;

    box-shadow:0 4px 12px rgba(0,0,0,.15);

    transition:.2s;

}

.card:hover{

    transform:scale(1.02);

}

a{

    text-decoration:none;

    color:#1565C0;

    font-size:24px;

    font-weight:bold;

}

footer{

    margin-top:50px;

    text-align:center;

    color:#888;

    padding:20px;

}

</style>

</head>

<body>

<header>

<h1>📚 SocialTest</h1>

<p>滝高校・岐阜高校レベル　社会学習サイト</p>

</header>

<div class="card">
<a href="#">📅 今日の10問</a>
</div>

<div class="card">
<a href="#">🏯 歴史</a>
</div>

<div class="card">

</div>

</div>

</div>

</div>

</div>

<footer>

</html>
