<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialTest</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
</head>

<body>

<header>

    <h1>📚 SocialTest</h1>

    <p>高校受験 社会学習システム</p>

</header>

<main class="container">

<section class="welcome card">

<h2>ようこそ！</h2>

<p>
今日も社会を頑張ろう！
</p>

</section>

<section class="menu">

<a class="card menu-card" href="quiz.html?mode=today">

<div class="icon">📅</div>

<h2>今日の10問</h2>

<p>AIおすすめ問題</p>

</a>

<a class="card menu-card" href="quiz.html?subject=history">

<div class="icon">🏯</div>

<h2>歴史</h2>

<p>古代～現代</p>

</a>

<a class="card menu-card" href="quiz.html?subject=geography">

<div class="icon">🗾</div>

<h2>地理</h2>

<p>日本・世界</p>

</a>

<a class="card menu-card" href="quiz.html?subject=civics">

<div class="icon">⚖️</div>

<h2>公民</h2>

<p>政治・経済</p>

</a>

<a class="card menu-card" href="quiz.html?mode=random">

<div class="icon">🎲</div>

<h2>ランダム50問</h2>

<p>全範囲から出題</p>

</a>

<a class="card menu-card" href="result.html">

<div class="icon">📊</div>

<h2>成績</h2>

<p>学習履歴を見る</p>

</a>

</section>

<section class="status card">

<h2>学習状況</h2>

<div class="status-grid">

<div>

<h3 id="studyDays">0</h3>

<p>連続学習日数</p>

</div>

<div>

<h3 id="totalAnswer">0</h3>

<p>総回答数</p>

</div>

<div>

<h3 id="correctRate">0%</h3>

<p>正答率</p>

</div>

</div>

</section>

</main>

<footer>

<p>

SocialTest Version 1.0

</p>

</footer>

<script src="js/storage.js"></script>

<script src="js/app.js"></script>

</body>
</html>
